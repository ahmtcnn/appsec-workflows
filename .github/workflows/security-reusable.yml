name: AppSec Security (Reusable)
on:
  workflow_call:
    inputs:
      enable_container_scan:
        type: boolean
        default: true
      enable_dast:
        type: boolean
        default: false
      dast_target:
        type: string
        default: 'http://localhost:5000'
      dast_start_command:
        type: string
        default: ''
      dast_wait_seconds:
        type: number
        default: 20
      critical_threshold:
        type: number
        default: 0
      high_threshold:
        type: number
        default: 5
      soft_fail:
        type: boolean
        default: true
jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - run: echo "reusable called OK, enable_dast=${{ inputs.enable_dast }}, target=${{ inputs.dast_target }}"
